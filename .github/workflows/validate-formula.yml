name: Validate formula

on:
  pull_request:
  workflow_dispatch:

jobs:
  validate-formula:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate formula
        uses: ./.github/actions/validate-formula
