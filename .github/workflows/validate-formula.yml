name: Validate formula

on:
  pull_request:
  workflow_dispatch:

jobs:
  validate-formula:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Validate formula
        uses: ./.github/actions/validate-formula
